name: Build desktop installers

# Builds the macOS (.dmg) and Windows (.exe) installers on their native
# runners (native modules like better-sqlite3 can't be cross-compiled reliably),
# then attaches them to a GitHub Release.
#
# To cut a release: push a tag like v1.0.0 (see README). You can also run this
# manually from the Actions tab to produce installers without a release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (Apple Silicon)
            args: --mac --arm64
          - os: macos-13
            label: macOS (Intel)
            args: --mac --x64
          - os: windows-latest
            label: Windows
            args: --win --x64
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Installs root, backend, and frontend dependencies (root postinstall
      # installs the two sub-projects).
      - name: Install dependencies
        run: npm install

      - name: Build frontend + backend
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Package installer
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # Skip code signing (unsigned build). Remove/replace with real certs
          # to produce signed + notarized installers later.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          retention-days: 7
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.exe
            release/*.blockmap
            release/latest*.yml

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create / update the Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist-artifacts/*.dmg
            dist-artifacts/*.exe
            dist-artifacts/*.blockmap
            dist-artifacts/latest*.yml
